<style>
/* ── Design Tokens ── */
:root {
  --bg:#03030a; --bg2:#080815; --bg3:#0d0d20;
  --gold:#c9a84c; --gold2:#f0d080;
  --cyan:#00e5ff;
  --purple:#7c3aed; --purple2:#a855f7;
  --red:#ff4444; --green:#00ff88;
  --text:#e8e0ff; --text2:#c8c0e0;
  --border:rgba(201,168,76,0.2);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(180deg,#0c0520 0%,#130a30 8%,#1a0e42 18%,#120835 35%,#0a0520 55%,#050210 75%,#010108 100%);background-attachment:fixed;color:var(--text);font-family:'Cinzel Decorative','Noto Sans KR',serif;font-size:15px;min-height:100vh;overflow-x:hidden}

/* ── Starfield ── */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1.5px 1.5px at 5% 8%,rgba(255,255,255,.85) 0%,transparent 100%),radial-gradient(1px 1px at 12% 22%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 22% 5%,rgba(255,255,255,.75) 0%,transparent 100%),radial-gradient(2px 2px at 42% 12%,rgba(255,255,255,.9) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 65% 6%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(2px 2px at 88% 10%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 95% 25%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 30% 35%,rgba(255,255,255,.35) 0%,transparent 100%),radial-gradient(1px 1px at 55% 28%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 78% 18%,rgba(255,255,255,.45) 0%,transparent 100%),radial-gradient(2px 2px at 15% 15%,rgba(180,140,255,.5) 0%,transparent 100%),radial-gradient(2px 2px at 72% 8%,rgba(201,168,76,.4) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 50% 20%,rgba(100,180,255,.35) 0%,transparent 100%),radial-gradient(ellipse 180px 90px at 25% 12%,rgba(124,58,237,.05) 0%,transparent 70%),radial-gradient(ellipse 120px 60px at 70% 18%,rgba(80,40,180,.04) 0%,transparent 70%),linear-gradient(180deg,transparent 40%,rgba(1,1,8,.6) 70%,rgba(1,1,8,.95) 100%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-10%;left:-10%;width:50%;height:45%;background:radial-gradient(ellipse,rgba(100,50,200,.06) 0%,rgba(60,20,160,.03) 40%,transparent 70%);pointer-events:none;z-index:0}

/* ── Layout ── */
.bg-cosmos{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-cosmos svg{width:100%;height:100%}
.container{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:20px}

/* ── Header ── */
header{text-align:center;padding:40px 20px 30px}
.header-ornament{font-size:12px;letter-spacing:8px;color:var(--gold);text-transform:uppercase;font-family:'Space Mono',monospace;margin-bottom:10px;opacity:.7}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(24px,4vw,48px);background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px;animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.subtitle{color:var(--text2);font-size:13px;letter-spacing:3px;margin-top:8px;font-weight:300}
.divider{width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px auto}

/* ── Time Bar ── */
.time-bar{display:flex;justify-content:center;gap:30px;padding:10px;background:rgba(201,168,76,.05);border:1px solid var(--border);border-radius:4px;margin-bottom:30px;font-family:'Space Mono',monospace;font-size:12px;color:var(--gold);flex-wrap:wrap}
.time-item span{color:var(--text2);margin-right:6px}

/* ── Nav Tabs ── */
.nav-tabs{display:flex;gap:3px;margin-bottom:24px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:5px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.nav-tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:1 0 auto;min-width:auto;padding:11px 14px;background:transparent;border:none;color:var(--text2);font-family:'Cinzel Decorative','Noto Sans KR',serif;font-size:13px;cursor:pointer;border-radius:6px;transition:all .3s cubic-bezier(.16,1,.3,1);letter-spacing:1px;white-space:nowrap;text-align:center;display:inline-flex;align-items:center;gap:5px}
.tab-btn svg{opacity:.7;flex-shrink:0}
.tab-btn.active svg{opacity:1;stroke:var(--gold2)}
.tab-btn:hover svg{opacity:1}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.05)}
.tab-btn.active{background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(124,58,237,.2));color:var(--gold2);border:1px solid var(--border)}
.tab-btn:active{transform:scale(.97)}

/* ── Panels ── */
.panel{display:none}
.panel.active{display:block;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Cards ── */
.card{background:linear-gradient(135deg,rgba(13,13,32,.9),rgba(8,8,21,.9));border:1px solid var(--border);border-radius:12px;padding:24px;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s,transform .3s;font-size:14px;line-height:1.9}
.card:hover{border-color:rgba(201,168,76,.4);box-shadow:0 4px 24px rgba(201,168,76,.06);transform:translateY(-2px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
.card-title{font-family:'Cinzel Decorative',serif;font-size:13px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.card-title .icon{display:inline-flex;align-items:center;vertical-align:middle}

/* ── Grid Layouts ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.section-gap{margin-bottom:16px}

/* ── Market Ticker ── */
.ticker-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ticker-item:last-child{border-bottom:none}
.ticker-name{font-family:'Cinzel Decorative','Space Mono',monospace;font-size:15px;color:var(--text);font-weight:700}
.ticker-sub{font-size:12px;color:var(--text2);margin-top:3px}
.ticker-price{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;text-align:right}
.ticker-change{font-size:13px;font-family:'Space Mono',monospace;margin-top:2px;text-align:right}
.up{color:var(--green)} .down{color:var(--red)}

/* ── Stat Big ── */
.stat-big{text-align:center;padding:20px}
.stat-num{font-family:'Space Mono',monospace;font-size:46px;font-weight:700;line-height:1;margin-bottom:6px}
.stat-label{font-size:13px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;font-family:'Cinzel Decorative',serif}

/* ── Signals ── */
.signal-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.signal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.signal-dot.bull{background:var(--green);box-shadow:0 0 8px var(--green)}
.signal-dot.bear{background:var(--red);box-shadow:0 0 8px var(--red)}
.signal-dot.neutral{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.signal-text{font-size:14px;color:var(--text2);flex:1;line-height:1.6}
.signal-score{font-family:'Space Mono',monospace;font-size:13px;font-weight:700}

/* ── Mini Ticker ── */
.mini-ticker-bar{display:flex;gap:6px;padding:10px 12px;background:rgba(201,168,76,.04);border:1px solid var(--border);border-radius:6px;overflow-x:auto;scrollbar-width:none}
.mini-ticker-bar::-webkit-scrollbar{display:none}
.mini-ticker-item{flex:1;min-width:100px;text-align:center;padding:6px 8px;border-right:1px solid rgba(255,255,255,.04);white-space:nowrap}
.mini-ticker-item:last-child{border-right:none}
.mini-label{font-size:12px;color:var(--text2);letter-spacing:1px;display:block;margin-bottom:3px;font-family:'Cinzel Decorative',serif}
.mini-val{font-family:'Space Mono',monospace;font-size:15px;color:var(--text);font-weight:700}

/* ── Mood Meter ── */
.mood-meter{width:100%;max-width:300px;height:28px;background:rgba(255,255,255,.06);border-radius:14px;position:relative;overflow:hidden;border:1px solid var(--border)}
.mood-fill{height:100%;border-radius:14px;transition:width 1.5s cubic-bezier(.16,1,.3,1),background 1s;width:50%;background:linear-gradient(90deg,var(--red),var(--gold),var(--green))}
.mood-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Space Mono',monospace;font-size:11px;color:white;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.6);white-space:nowrap}

/* ── Gauge ── */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0}
.gauge{width:180px;height:90px;position:relative;margin-bottom:16px}
.gauge svg{width:100%;height:100%}
.gauge-label{text-align:center;font-family:'Space Mono',monospace}
.gauge-pct{font-size:36px;font-weight:700;color:var(--cyan)}
.gauge-desc{font-size:12px;color:var(--text2);margin-top:4px}

/* ── Rate Bar ── */
.rate-bars{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.rate-bar-item{display:flex;align-items:center;gap:10px;font-size:12px;font-family:'Space Mono',monospace}
.rate-bar-label{width:90px;color:var(--text2);font-size:11px}
.rate-bar-track{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.rate-bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
.rate-bar-val{width:40px;text-align:right;color:var(--cyan)}

/* ── Planet Cards ── */
.astro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.planet-card{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.3);border-radius:8px;padding:12px;text-align:center;transition:all .3s}
.planet-card:hover{background:rgba(124,58,237,.2);border-color:rgba(168,85,247,.5);transform:translateY(-2px)}
.planet-symbol{font-size:24px;margin-bottom:6px}
.planet-name{font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.planet-sign{font-size:13px;color:var(--text);font-weight:500}
.planet-deg{font-size:10px;color:var(--text2);margin-top:2px;font-family:'Space Mono',monospace}

/* ── Zodiac Insight ── */
.zodiac-insight{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(201,168,76,.05));border:1px solid rgba(124,58,237,.3);border-radius:8px;padding:16px;margin-top:16px}
.zodiac-insight-title{font-size:11px;letter-spacing:2px;color:var(--purple2);margin-bottom:10px;text-transform:uppercase}
.zodiac-insight-text{font-size:13px;color:var(--text2);line-height:1.8}

/* ── Chips ── */
.topic-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:transparent;transition:all .3s}
.chip:hover,.chip.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1)}

/* ── Energy Gauge ── */
.energy-gauge{width:100%;height:20px;background:rgba(255,255,255,.04);border-radius:10px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.energy-fill{height:100%;border-radius:10px;position:relative;transition:width 2s cubic-bezier(.16,1,.3,1);min-width:2px}
.energy-fill-usdt{background:linear-gradient(90deg,rgba(0,255,136,.3),rgba(0,255,136,.7),rgba(0,255,136,.9));box-shadow:0 0 12px rgba(0,255,136,.4),inset 0 0 6px rgba(255,255,255,.1)}
.energy-fill-usdc{background:linear-gradient(90deg,rgba(0,229,255,.3),rgba(0,229,255,.7),rgba(0,229,255,.9));box-shadow:0 0 12px rgba(0,229,255,.4),inset 0 0 6px rgba(255,255,255,.1)}
.energy-glow{position:absolute;right:0;top:0;bottom:0;width:30px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3));border-radius:0 10px 10px 0;animation:energyPulse 2s ease-in-out infinite}
@keyframes energyPulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ── Flash Animation ── */
@keyframes flashGreen{0%{text-shadow:0 0 12px rgba(0,255,136,.8)}100%{text-shadow:none}}
@keyframes flashRed{0%{text-shadow:0 0 12px rgba(255,68,68,.8)}100%{text-shadow:none}}
.flash-up{animation:flashGreen .6s ease-out}
.flash-down{animation:flashRed .6s ease-out}

/* ── Whale ── */
.whale-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;animation:whaleFadeIn .5s ease}
.whale-item:last-child{border-bottom:none}
@keyframes whaleFadeIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.whale-emoji{font-size:18px;flex-shrink:0}
.whale-amount{font-family:'Space Mono',monospace;font-weight:700;color:var(--gold)}
.whale-detail{color:var(--text2);font-size:11px}
.whale-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--text2);margin-left:auto;flex-shrink:0}

/* ── Misc ── */
.live-dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-right:6px;animation:pulse 2s infinite;box-shadow:0 0 6px var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes skeletonPulse{0%,100%{opacity:.4}50%{opacity:1}}
.loading-pulse{animation:skeletonPulse 1.5s ease-in-out infinite}
@keyframes skeletonShimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.skeleton{background:linear-gradient(90deg,rgba(201,168,76,.06) 25%,rgba(201,168,76,.12) 50%,rgba(201,168,76,.06) 75%);background-size:200px 100%;animation:skeletonShimmer 1.2s infinite linear;border-radius:4px;height:18px;margin:6px 0}
.skeleton-wide{width:80%}.skeleton-short{width:40%}.skeleton-full{width:100%}
.stat-num.skeleton-val{color:transparent!important;background:linear-gradient(90deg,rgba(201,168,76,.08) 25%,rgba(201,168,76,.15) 50%,rgba(201,168,76,.08) 75%);background-size:200px 100%;animation:skeletonShimmer 1.2s infinite linear;border-radius:3px}
/* ── News Items ── */
.news-item{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:default;transition:background .2s}
.news-item:last-child{border-bottom:none}
.news-item:hover{background:rgba(201,168,76,.03);border-radius:6px;padding-left:8px;padding-right:8px}
.news-title{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:4px;font-weight:400}
.news-title a{color:var(--text);text-decoration:none;transition:color .2s}
.news-title a:hover{color:var(--gold)}
.news-meta{display:flex;gap:10px;align-items:center;font-size:11px;color:var(--text2)}
.news-source{font-size:10px;color:var(--gold);font-family:'Space Mono',monospace;letter-spacing:.5px}
.news-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--text2)}
.news-tag{font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid var(--border);color:var(--text2);letter-spacing:.5px}

.disclaimer{text-align:center;font-size:10px;color:rgba(144,144,176,.4);padding:20px;letter-spacing:1px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Responsive ── */
@media(max-width:900px){.grid-4{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr}.astro-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){
  .container{padding:6px}header{padding:16px 6px 12px}h1{letter-spacing:1px;font-size:20px}.subtitle{font-size:9px;letter-spacing:1px}
  .header-ornament{font-size:9px;letter-spacing:4px}
  .divider{width:120px;margin:12px auto}
  .time-bar{gap:6px;font-size:9px;padding:6px;flex-wrap:wrap;justify-content:center}
  .time-item span{margin-right:3px}
  .tab-btn{min-width:auto;padding:8px 10px;font-size:10px;letter-spacing:0;gap:3px}
  .tab-btn svg{width:12px;height:12px}
  .nav-tabs{gap:2px;padding:3px;margin-bottom:16px}
  .card{padding:12px;border-radius:8px;font-size:13px;line-height:1.7}
  .card-title{font-size:9px;letter-spacing:1px;margin-bottom:14px;flex-wrap:wrap;gap:4px}
  .stat-num{font-size:20px}.stat-label{font-size:8px;letter-spacing:1px}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;gap:8px}
  .section-gap{margin-bottom:10px}
  .signal-row{gap:8px;padding:8px 0}.signal-text{font-size:11px;line-height:1.5}
  .ticker-item{padding:10px 0;flex-wrap:wrap;gap:4px}
  .ticker-name{font-size:12px}.ticker-price{font-size:14px}.ticker-sub{font-size:10px}
  .ticker-change{font-size:11px}
  .gauge{width:140px;height:70px}.gauge-pct{font-size:26px}.gauge-desc{font-size:10px}
  .gauge-wrap{padding:12px 0}
  .mini-ticker-bar{gap:2px;padding:6px;flex-wrap:wrap;justify-content:center}
  .mini-ticker-item{min-width:70px;padding:4px 6px;flex:0 0 auto}.mini-label{font-size:9px}.mini-val{font-size:11px}
  .mood-meter{max-width:100%;height:24px}.mood-label{font-size:10px}
  #m7List{grid-template-columns:1fr 1fr;gap:6px}

  .disclaimer{font-size:8px;padding:12px}
  svg text{font-size:90%}
}
@media(max-width:400px){
  h1{font-size:17px}.stat-num{font-size:17px}
  .grid-4{grid-template-columns:1fr 1fr}
  #m7List{grid-template-columns:1fr}#astroCounters{grid-template-columns:1fr}

}

function updateTime() {
  const now = new Date();
  const fmt = tz => now.toLocaleTimeString('ko-KR',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  if($('kstTime')) $('kstTime').textContent = fmt('Asia/Seoul');
  if($('nyTime')) $('nyTime').textContent = fmt('America/New_York');
  if($('ldnTime')) $('ldnTime').textContent = fmt('Europe/London');
  if($('tokyoTime')) $('tokyoTime').textContent = fmt('Asia/Tokyo');
  if($('todayDate')) $('todayDate').textContent = now.toLocaleDateString('ko-KR',{year:'numeric',month:'numeric',day:'numeric',weekday:'short'});
  if($('astroDateLabel')) $('astroDateLabel').textContent = now.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});
}

function flash(el, up) { if(!el) return; el.classList.remove('flash-up','flash-down'); void el.offsetWidth; el.classList.add(up?'flash-up':'flash-down'); }

// 타임스탬프: 각 소스별 독립 시각 관리
const _tsMap = {};
function ts(id, source) {
  // source가 지정되면 해당 소스의 최종 갱신 시각 기록
  if (source) _tsMap[id] = source;
  const el = $(id);
  if (!el) return;
  const t = _tsMap[id] || new Date();
  const d = t instanceof Date ? t : new Date(t);
  if (isNaN(d.getTime())) { el.textContent = '--'; return; }
  el.textContent = d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function getBSGrade(v) {
  if(v>=80) return {kr:'매우탐욕',color:'#00ff88'};
  if(v>=60) return {kr:'탐욕',color:'#88dd44'};
  if(v>=40) return {kr:'중립',color:'#ffdd32'};
  if(v>=20) return {kr:'공포',color:'#ff8844'};
  return {kr:'매우공포',color:'#ff4444'};
}

    });

function renderLiqBars(data) {
  const el=$('liqBars'); if(!el) return;
  const cp = data?.current_price||130000, range=8000;
  const levels=[];
  for(let i=0;i<16;i++){const p=cp+range-(i*range*2/15);const above=p>cp;const intensity=Math.random()*.8+.2;const vol=Math.round(Math.random()*200+20);levels.push({p,above,intensity,vol});}
  el.innerHTML = levels.map(l=>{const c=l.above?`rgba(0,255,136,${.15+l.intensity*.6})`:`rgba(255,68,68,${.15+l.intensity*.6})`;const glow=l.intensity>.7?`box-shadow:0 0 8px ${l.above?'rgba(0,255,136,.4)':'rgba(255,68,68,.4)'};`:'';return `<div style="display:flex;align-items:center;gap:4px;height:14px"><div style="width:${Math.max(8,l.intensity*100)}%;height:10px;border-radius:3px;background:${c};${glow}transition:width 1s"></div><span style="font-size:11px;color:var(--text2);font-family:'Space Mono',monospace">$${Math.round(l.p/1000)}K · ${l.vol}M</span></div>`;}).join('');
  if($('liqLongTotal'))$('liqLongTotal').textContent='$'+Math.round(Math.random()*200+50)+'M';
  if($('liqShortTotal'))$('liqShortTotal').textContent='$'+Math.round(Math.random()*150+30)+'M';
}

// ── Translation: Google Translate 간이 번역 ──
async function translateToKo(text) {
  if (!text || /[가-힣]/.test(text)) return text; // 이미 한글이면 패스
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ko&dt=t&q=${encodeURIComponent(text.slice(0,400))}`;
    const res = await fetch(url);
    const data = await res.json();
    return data[0].map(s=>s[0]).join('') || text;
  } catch(e) { return text; }
}

// ── News: 확장 소스 (크립토 + 매크로 + 마켓) ──
const NEWS_FEEDS = [
  // 크립토
  {url:'https://cointelegraph.com/rss', cat:'crypto', label:'크립토', direct:true},
  {url:'https://www.coindesk.com/arc/outboundfeeds/rss/', cat:'crypto', label:'크립토', direct:true},
  {url:'https://investing.com/rss/news_301.rss', cat:'crypto', label:'크립토', direct:true},
  // 매크로
  {url:'https://news.google.com/rss/search?q=economy+fed+inflation+when:2d&hl=en&gl=US&ceid=US:en', cat:'macro', label:'매크로'},
  {url:'https://news.google.com/rss/search?q=reuters+bloomberg+economy+when:2d&hl=en&gl=US&ceid=US:en', cat:'macro', label:'매크로'},
  // 마켓
  {url:'https://news.google.com/rss/search?q=stock+market+S%26P500+nasdaq+when:2d&hl=en&gl=US&ceid=US:en', cat:'market', label:'마켓'},
  // 테크
  {url:'https://news.google.com/rss/search?q=AI+tech+semiconductor+when:2d&hl=en&gl=US&ceid=US:en', cat:'tech', label:'테크'},
];

async function fetchNews() {
  const allNews = [];
  const PROXY = 'https://api.allorigins.win/raw?url=';

  for (const feed of NEWS_FEEDS) {
    try {
      const fetchUrl = feed.direct ? PROXY + encodeURIComponent(feed.url) : PROXY + encodeURIComponent(feed.url);
      const res = await fetch(fetchUrl, {signal: AbortSignal.timeout(8000)});
      const text = await res.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, 'text/xml');
      const items = xml.querySelectorAll('item');
      let count = 0;
      items.forEach((item) => {
        if (count >= 5) return;
        const title = (item.querySelector('title')?.textContent || '').replace(/<!\[CDATA\[(.*?)\]\]>/g,'$1').trim();
        const link = item.querySelector('link')?.textContent || '#';
        const pubDate = item.querySelector('pubDate')?.textContent || '';
        const source = item.querySelector('source')?.textContent || '';
        if (!title || title.length < 10) return;
        let timeStr = '';
        if (pubDate) {
          const d = new Date(pubDate);
          const diff = Math.floor((Date.now() - d.getTime()) / 60000);
          if (diff < 0 || diff > 10080) return; // 7일 이상 된 건 제외
          if (diff < 60) timeStr = diff + '분 전';
          else if (diff < 1440) timeStr = Math.floor(diff / 60) + '시간 전';
          else timeStr = Math.floor(diff / 1440) + '일 전';
        }
        allNews.push({title, link, source, timeStr, cat: feed.cat, label: feed.label, date: new Date(pubDate || Date.now())});
        count++;
      });
    } catch(e) { /* silently skip failed feeds */ }
  }

  // 시간순 정렬 + 중복 제거
  allNews.sort((a, b) => b.date - a.date);
  const seen = new Set();
  const unique = allNews.filter(n => {
    const key = n.title.slice(0,40).toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  }).slice(0, 25);

  // 번역 (상위 25개만)
  const translated = await Promise.all(unique.map(async n => {
    n.title = await translateToKo(n.title);
    return n;
  }));

  const nl = $('newsList');
  if (nl) {
    if (translated.length === 0) {
      nl.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text2);font-size:12px">뉴스를 불러올 수 없습니다.</div>';
    } else {
      const catColors = {crypto:'var(--green)',macro:'var(--gold)',market:'var(--cyan)',tech:'var(--purple2)'};
      nl.innerHTML = translated.map(n => {
        const cc = catColors[n.cat] || 'var(--text2)';
        return `<div class="news-item" data-cat="${n.cat}">
          <div class="news-title"><a href="${n.link}" target="_blank" rel="noopener">${n.title}</a></div>
          <div class="news-meta">
            <span class="news-tag" style="border-color:${cc};color:${cc}">${n.label}</span>
            ${n.source ? `<span class="news-source">${n.source}</span>` : ''}
            <span class="news-time">${n.timeStr}</span>
          </div>
        </div>`;
      }).join('');
    }
  }
  ts('newsUpdated', new Date());
}

// Phase 2: Skeleton state — show shimmer on key vitals
(function initSkeletons() {
  ['ovBtcPrice','ovSpx','ovNdx','ovKospi'].forEach(id => {
    const el = $(id);
    if (el && (el.textContent === '--' || el.textContent === '')) {
      el.textContent = '---';
      el.classList.add('skeleton-val');

  });
})();

// Phase 3: Stale-While-Revalidate — localStorage 캐시로 즉시 렌더
const CACHE_KEYS = {crypto:'jn_crypto',forex:'jn_forex',fg:'jn_fg',onchain:'jn_onchain'};
const CACHE_TTL = {crypto:60000,forex:120000,fg:600000,onchain:120000}; // ms

function cacheSet(key, data) {
  try { localStorage.setItem(key, JSON.stringify({t:Date.now(),d:data})); } catch(e) {}
}
function cacheGet(key, ttl) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const {t, d} = JSON.parse(raw);
    if (Date.now() - t > ttl * 3) return null; // 3x TTL 넘으면 폐기
    return {data: d, fresh: Date.now() - t <= ttl};
  } catch(e) { return null; }
}

// Wrap fetch functions with caching
const _origFetchCrypto = fetchCrypto;
const _origFetchForex = fetchForex;
const _origFetchFearGreed = fetchFearGreed;
const _origFetchOnchainData = fetchOnchainData;

// Crypto cache wrapper
fetchCrypto = async function() {
  await _origFetchCrypto();
  // Cache the visible state after successful fetch
  try {
    const btcEl = $('ovBtcPrice');
    if (btcEl && btcEl.textContent !== '---' && btcEl.textContent !== '--') {
      cacheSet(CACHE_KEYS.crypto, {
        btc: btcEl.textContent,
        btcChg: $('ovBtcChange')?.textContent || '',
        btcCls: $('ovBtcChange')?.className || '',
        eth: $('ovEthMini')?.textContent || '',
        sol: $('ovSol')?.textContent || '',
        xrp: $('ovXrp')?.textContent || '',
      });
    }
  } catch(e) {}
};

// Onchain cache wrapper
fetchOnchainData = async function() {
  await _origFetchOnchainData();
  try {
    const spx = $('ovSpx');
    if (spx && spx.textContent !== '---' && spx.textContent !== '--') {
      cacheSet(CACHE_KEYS.onchain, {
        spx: spx.textContent, spxChg: $('ovSpxChange')?.textContent,
        ndx: $('ovNdx')?.textContent, ndxChg: $('ovNdxChange')?.textContent,
        kospi: $('ovKospi')?.textContent, kospiChg: $('ovKospiChange')?.textContent,
        funding: $('ovFunding')?.textContent,
        longShort: $('ovLongShort')?.textContent,
      });
    }
  } catch(e) {}
};

// Phase 4: Instant restore from cache
(function restoreFromCache() {
  const cc = cacheGet(CACHE_KEYS.crypto, CACHE_TTL.crypto);
  if (cc) {
    const d = cc.data;
    const btcEl = $('ovBtcPrice');
    if (btcEl && d.btc) { btcEl.textContent = d.btc; btcEl.classList.remove('skeleton-val'); btcEl.className = 'stat-num ' + (d.btcCls?.includes('up') ? 'up' : 'down'); }
    if (d.btcChg && $('ovBtcChange')) { $('ovBtcChange').textContent = d.btcChg; }
    if (d.eth && $('ovEthMini')) $('ovEthMini').textContent = d.eth;
    if (d.sol && $('ovSol')) $('ovSol').textContent = d.sol;
    if (d.xrp && $('ovXrp')) $('ovXrp').textContent = d.xrp;
  }
  const oc = cacheGet(CACHE_KEYS.onchain, CACHE_TTL.onchain);
  if (oc) {
    const d = oc.data;
    [['ovSpx','spx','ovSpxChange','spxChg'],['ovNdx','ndx','ovNdxChange','ndxChg'],['ovKospi','kospi','ovKospiChange','kospiChg']].forEach(([pid,pk,cid,ck]) => {
      const el = $(pid);
      if (el && d[pk]) { el.textContent = d[pk]; el.classList.remove('skeleton-val'); }
      if (d[ck] && $(cid)) $(cid).textContent = d[ck];
    });
    if (d.funding && $('ovFunding')) $('ovFunding').textContent = d.funding;
    if (d.longShort && $('ovLongShort')) $('ovLongShort').textContent = d.longShort;
  }
})();

// Phase 5: Remove skeletons after real data arrives
function clearSkeletons() {
  $$('.skeleton-val').forEach(el => el.classList.remove('skeleton-val'));
}

// Phase 6: Preloaded data 즉시 적용 + 나머지 병렬
(async function applyPreloads() {
  // Onchain data (preloaded)
  try {
    const data = await _preloadOnchain;
    if (data) {
      // fetchOnchainData의 로직을 직접 실행하지 않고, 
      // 원래 함수에 데이터를 주입하는 대신 간이 적용
      const m = data.market||{};
      // BTC
      if(m.btc_usd){const el=$('ovBtcPrice');if(el){el.textContent='$'+m.btc_usd.toLocaleString();el.classList.remove('skeleton-val');el.className='stat-num '+((m.btc_usd_chg||0)>=0?'up':'down');}}
      // SPX/NDX/KOSPI
      [['ovSpx','spx','ovSpxChange','spx_chg'],['ovNdx','ndx','ovNdxChange','ndx_chg'],['ovKospi','kospi','ovKospiChange','kospi_chg']].forEach(([pid,pk,cid,ck])=>{
        if(m[pk]){const el=$(pid);if(el){el.textContent=m[pk].toLocaleString(undefined,{maximumFractionDigits:0});el.classList.remove('skeleton-val');el.className='stat-num '+((m[ck]||0)>=0?'up':'down');}
        const ce=$(cid);if(ce){ce.textContent=((m[ck]||0)>=0?'+':'')+(m[ck]||0).toFixed(2)+'%';ce.className='ticker-change '+((m[ck]||0)>=0?'up':'down');}}
      });
      console.log('⚡ Preload: onchain applied');
    }
  } catch(e) {}

  // Crypto (preloaded) 
  try {
    const raw = await _preloadCrypto;
    if (raw && raw.length) {
      const btc = raw.find(c=>c.id==='bitcoin');
      if(btc){const el=$('ovBtcPrice');if(el&&el.classList.contains('skeleton-val')){el.textContent='$'+btc.current_price.toLocaleString();el.classList.remove('skeleton-val');}}
      console.log('⚡ Preload: crypto applied');
    }
  } catch(e) {}

  // F&G (preloaded)
  try {
    const d = await _preloadFG;
    if (d && d.data) {
      const val=parseInt(d.data[0].value),grade=getBSGrade(val);

      if($('ovCryptoFGLabel')){$('ovCryptoFGLabel').textContent=grade.kr;$('ovCryptoFGLabel').style.color=grade.color;$('ovCryptoFGLabel').classList.remove('loading-pulse');}
      console.log('⚡ Preload: F&G applied');
    }
  } catch(e) {}

  clearSkeletons();
})();
